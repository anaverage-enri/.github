name: PR Size Labels

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Label PR size
        uses: pascalgn/size-label-action@v0.5.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          prefix: "size/"
          sizes: >
            {
              "XS": 10,
              "S": 30,
              "M": 100,
              "L": 500,
              "XL": 1000
            }
