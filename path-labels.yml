docs:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"

workflows:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"

github-config:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "!.github/workflows/**"

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.*"
          - "**/*.spec.*"
          - "**/*_test.go"
          - "tests/**"
          - "**/__tests__/**"
